{% extends "layout.html" %}

{% block title %}
Donut Shop - Login
{% endblock %}

{% block content %}
<h1>Login</h1>
<form method="post"> 
    <p>Username:<input type="text" required></p>
    <p>Password:<input type="password" required></p>
    <br>
    <input class="buttons submit" type="submit" value="Login">
</form>

<p>No account yet? Register below instead.</p>
<hr>

<h1>Register</h1>
<form method="post"> 
    <p>Username:<input type="text" required></p>
    <p>Password:<input type="password" required></p>
    <p>Re-enter Password:<input type="password" required></p>
    <p>
    <label>First Name:</label><input type="text" required>
    </p>
    <p>
    <label>Last Name:</label><input type="text" required>
    </p>
    <p>
    <label>Address:</label><textarea required></textarea>
    </p>
    <p>
    <label>Phone Number:</label><input type="tel" required>
    </p>
    <p>
    <label>Email Address:</label><input type="email">
    </p>
    <br>
    <input class="buttons submit" type="submit" value="Register Account">
</form>
{% endblock %}
